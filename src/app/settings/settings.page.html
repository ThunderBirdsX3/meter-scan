<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>ตั้งค่า</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="settings-content">

  <!-- ── Data management menu ────────────────────────────────────────────── -->
  <ion-list-header class="section-header">
    <ion-label>จัดการข้อมูล</ion-label>
  </ion-list-header>

  <ion-list lines="inset" class="settings-list">
    <ion-item routerLink="/history" button detail="true">
      <span slot="start" class="ds-icon-tile" aria-hidden="true">
        <ion-icon name="time-outline"></ion-icon>
      </span>
      <ion-label>ประวัติ</ion-label>
    </ion-item>
    <ion-item routerLink="vehicles" button detail="true">
      <span slot="start" class="ds-icon-tile" aria-hidden="true">
        <ion-icon name="car-outline"></ion-icon>
      </span>
      <ion-label>รถของฉัน</ion-label>
    </ion-item>
    <ion-item routerLink="trips" button detail="true">
      <span slot="start" class="ds-icon-tile" aria-hidden="true">
        <ion-icon name="navigate-outline"></ion-icon>
      </span>
      <ion-label>ทริป</ion-label>
    </ion-item>
  </ion-list>

  <!-- ── Appearance ───────────────────────────────────────────────────────── -->
  <ion-list-header class="section-header">
    <ion-label>การแสดงผล</ion-label>
  </ion-list-header>

  <ion-list lines="inset" class="settings-list">
    <ion-item>
      <span slot="start" class="ds-icon-tile" aria-hidden="true">
        <ion-icon name="moon-outline"></ion-icon>
      </span>
      <ion-label>โหมดมืด</ion-label>
      <ion-toggle
        slot="end"
        [checked]="darkMode"
        (ionChange)="onDarkModeToggle($event)"
        aria-label="สลับโหมดมืด">
      </ion-toggle>
    </ion-item>
  </ion-list>

  <!-- ── Other ────────────────────────────────────────────────────────────── -->
  <ion-list-header class="section-header">
    <ion-label>ทั่วไป</ion-label>
  </ion-list-header>

  <ion-list lines="inset" class="settings-list">
    <!-- About -->
    <ion-item>
      <span slot="start" class="ds-icon-tile" aria-hidden="true">
        <ion-icon name="information-circle-outline"></ion-icon>
      </span>
      <ion-label>
        เวอร์ชัน
        <p>Meter Scan 1.0.0</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
