<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/settings" aria-label="กลับ"></ion-back-button>
    </ion-buttons>
    <ion-title>ทริป</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="openTripModal()" aria-label="เพิ่มทริปใหม่">
        <ion-icon name="add-outline" slot="icon-only" aria-hidden="true"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="trips-content">

  <ion-list lines="inset" class="trips-list" *ngIf="trips.length > 0">
    <ion-item-sliding *ngFor="let t of trips">
      <ion-item>
        <ion-icon name="navigate-outline" slot="start" aria-hidden="true" class="item-icon"></ion-icon>
        <ion-label>
          <h3>{{ t.name }}</h3>
        </ion-label>
        <ion-toggle
          slot="end"
          class="enable-toggle"
          [checked]="t.isActive"
          (ionChange)="onToggle(t, $event)"
          [attr.aria-label]="'เปิดใช้งาน ' + t.name">
        </ion-toggle>
        <ion-buttons slot="end" class="item-actions">
          <ion-button fill="clear" (click)="openTripModal(t)" [attr.aria-label]="'แก้ไข ' + t.name">
            <ion-icon name="create-outline" aria-hidden="true"></ion-icon>
          </ion-button>
          <ion-button fill="clear" (click)="confirmDeleteTrip(t)" [attr.aria-label]="'ลบ ' + t.name" class="delete-action">
            <ion-icon name="trash-outline" aria-hidden="true"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option (click)="openTripModal(t)" [attr.aria-label]="'แก้ไข ' + t.name">
          <ion-icon name="create-outline" aria-hidden="true" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="confirmDeleteTrip(t)" [attr.aria-label]="'ลบ ' + t.name">
          <ion-icon name="trash-outline" aria-hidden="true" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div class="list-empty" *ngIf="trips.length === 0">
    <p>ยังไม่มีทริป — กด "+" เพื่อเพิ่ม</p>
  </div>

</ion-content>

<!-- ── Trip Modal (DS Component #11) ─────────────────────────────────────── -->
<ion-modal [isOpen]="tripModalOpen" (ionModalDidDismiss)="onTripModalDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title id="trip-modal-title">{{ tripModalMode === 'add' ? 'เพิ่มทริป' : 'แก้ไขทริป' }}</ion-title>
        <ion-buttons slot="start">
          <ion-button (click)="cancelTripModal()" aria-label="ยกเลิก">ยกเลิก</ion-button>
        </ion-buttons>
        <ion-buttons slot="end">
          <ion-button
            color="primary"
            [disabled]="!tripDraft.name || tripIsSaving"
            [attr.aria-disabled]="!tripDraft.name || tripIsSaving ? 'true' : null"
            [attr.aria-busy]="tripIsSaving ? 'true' : null"
            (click)="saveTrip()"
            aria-label="บันทึกข้อมูลทริป">
            บันทึก
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="modal-content" aria-labelledby="trip-modal-title">
      <div class="modal-form">

        <ion-item class="field-item">
          <ion-label position="stacked" class="field-label">ชื่อทริป *</ion-label>
          <ion-input
            type="text"
            [(ngModel)]="tripDraft.name"
            placeholder="เช่น กรุงเทพ–เชียงใหม่"
            aria-label="ชื่อทริป จำเป็น">
          </ion-input>
        </ion-item>

        <ion-item class="field-item">
          <ion-label position="stacked" class="field-label">รถ</ion-label>
          <ion-select
            [(ngModel)]="tripDraft.vehicleId"
            placeholder="เลือกรถ"
            interface="action-sheet"
            aria-label="เลือกรถสำหรับทริปนี้">
            <ion-select-option *ngFor="let v of vehicles" [value]="v.id">{{ v.name }}</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item class="field-item">
          <ion-label position="stacked" class="field-label">เลขไมล์เริ่มต้น (กม.)</ion-label>
          <ion-input
            type="number"
            inputmode="decimal"
            [(ngModel)]="tripDraft.startOdometer"
            aria-label="เลขไมล์เริ่มต้นเป็นกิโลเมตร"
            class="numeric-input">
          </ion-input>
        </ion-item>

      </div>
    </ion-content>
  </ng-template>
</ion-modal>

<!-- ── Delete confirm alert ──────────────────────────────────────────────── -->
<ion-alert
  [isOpen]="deleteTripAlertOpen"
  header="ลบทริป?"
  message="การดำเนินการนี้ไม่สามารถย้อนกลับได้"
  [buttons]="deleteTripButtons"
  (didDismiss)="deleteTripAlertOpen = false">
</ion-alert>
