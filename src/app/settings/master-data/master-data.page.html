<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/settings" aria-label="กลับ"></ion-back-button>
    </ion-buttons>
    <ion-title>แบรนด์และประเภทน้ำมัน</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="master-data-content">

  <!-- Read-only per FR-005 — no add/edit/delete UI -->
  <div class="brand-group" *ngFor="let group of brandGroups">
    <ion-list-header class="section-header">
      <div class="brand-header-row">
        <!-- Brand logo (Design Addition — external brand identity, not a DS token; falls
             back to a neutral icon if the bundled asset is missing) -->
        <ion-avatar class="brand-logo-avatar" *ngIf="group.brand.logoAsset && !logoErrors.has(group.brand.id)">
          <img [src]="group.brand.logoAsset" [alt]="group.brand.name + ' โลโก้'" (error)="onLogoError(group.brand.id)">
        </ion-avatar>
        <ion-icon
          *ngIf="!group.brand.logoAsset || logoErrors.has(group.brand.id)"
          name="business-outline"
          aria-hidden="true"
          class="brand-logo-fallback">
        </ion-icon>
        <ion-label>{{ group.brand.name }}</ion-label>
      </div>
    </ion-list-header>

    <ion-list lines="inset" class="master-data-list" *ngIf="group.offers.length > 0">
      <ion-item *ngFor="let offer of group.offers">
        <!-- Fuel-type color swatch — supplemental only; name/code text always present too -->
        <span
          class="color-swatch"
          slot="start"
          [style.background]="offer.color || 'var(--color-border-default)'"
          aria-hidden="true">
        </span>
        <ion-label>
          <h3>{{ offer.marketingName || offer.label }}</h3>
          <p>{{ offer.code }}</p>
        </ion-label>
      </ion-item>
    </ion-list>

    <div class="list-empty" *ngIf="group.offers.length === 0">
      <p>ยังไม่มีประเภทน้ำมันสำหรับแบรนด์นี้</p>
    </div>
  </div>

  <!-- Canonical fuel catalog — brand-agnostic flag list (schema v2); includes catalog-only
       codes no seeded brand currently offers (e.g. LPG) -->
  <ion-list-header class="section-header">
    <ion-label>ประเภทน้ำมันทั้งหมด (ไม่ระบุแบรนด์)</ion-label>
  </ion-list-header>

  <ion-list lines="inset" class="master-data-list">
    <ion-item *ngFor="let ft of catalog">
      <ion-label>
        <h3>{{ ft.label }}</h3>
        <p>{{ ft.code }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
