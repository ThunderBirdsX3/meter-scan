<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/settings" aria-label="กลับ"></ion-back-button>
    </ion-buttons>
    <ion-title>แบรนด์และประเภทน้ำมัน</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="master-data-content">

  <!-- Read-only per FR-005 — no add/edit/delete UI -->
  <div class="brand-group" *ngFor="let group of brandGroups">
    <ion-list-header class="section-header">
      <div class="brand-header-row">
        <!-- Brand logo (Design Addition — external brand identity, not a DS token; falls
             back to a neutral icon if the bundled asset is missing) -->
        <ion-avatar class="brand-logo-avatar" *ngIf="group.brand.logoAsset && !logoErrors.has(group.brand.id)">
          <img [src]="group.brand.logoAsset" [alt]="group.brand.name + ' โลโก้'" (error)="onLogoError(group.brand.id)">
        </ion-avatar>
        <ion-icon
          *ngIf="!group.brand.logoAsset || logoErrors.has(group.brand.id)"
          name="business-outline"
          aria-hidden="true"
          class="brand-logo-fallback">
        </ion-icon>
        <ion-label>{{ group.brand.name }}</ion-label>
      </div>
    </ion-list-header>

    <ion-list lines="inset" class="master-data-list" *ngIf="group.fuelTypes.length > 0">
      <ion-item *ngFor="let ft of group.fuelTypes">
        <!-- Fuel-type color swatch — supplemental only; name (+ grade) text always present too -->
        <span
          class="color-swatch"
          slot="start"
          [style.background]="ft.color || 'var(--color-border-default)'"
          aria-hidden="true">
        </span>
        <ion-label>
          <h3>{{ ft.name }}</h3>
          <p *ngIf="ft.grade">เกรด {{ ft.grade }}</p>
        </ion-label>
      </ion-item>
    </ion-list>

    <div class="list-empty" *ngIf="group.fuelTypes.length === 0">
      <p>ยังไม่มีประเภทน้ำมันสำหรับแบรนด์นี้</p>
    </div>
  </div>

  <!-- Fuel types not linked to a brand -->
  <ng-container *ngIf="ungroupedFuelTypes.length > 0">
    <ion-list-header class="section-header">
      <ion-label>ประเภทน้ำมันอื่นๆ</ion-label>
    </ion-list-header>

    <ion-list lines="inset" class="master-data-list">
      <ion-item *ngFor="let ft of ungroupedFuelTypes">
        <span
          class="color-swatch"
          slot="start"
          [style.background]="ft.color || 'var(--color-border-default)'"
          aria-hidden="true">
        </span>
        <ion-label>
          <h3>{{ ft.name }}</h3>
          <p *ngIf="ft.grade">เกรด {{ ft.grade }}</p>
        </ion-label>
      </ion-item>
    </ion-list>
  </ng-container>

</ion-content>
